<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--teal:#0d9488;--teal-dark:#0f766e;--slate:#0f172a;--blue-light:#EEF4FF;--muted:#64748b;--red:#ef4444;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#f8fafc 50%,#f0fdf4 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{width:100%;max-width:380px;background:white;border-radius:20px;padding:32px 28px;box-shadow:0 4px 32px rgba(0,0,0,0.08);}
.card-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.card-logo-img{width:56px;height:56px;border-radius:12px;object-fit:contain;border:1.5px solid #e2e8f0;}
.card-logo-text{font-size:18px;font-weight:800;color:var(--slate);}
.card-logo-text span{color:var(--teal);}
.screen{display:none;}
.screen.active{display:block;}
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:6px;}
.input-wrap{position:relative;}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.form-input{width:100%;padding:13px 14px 13px 42px;background:var(--blue-light);border:1.5px solid #C7D7F5;border-radius:12px;color:var(--slate);font-family:inherit;font-size:14px;outline:none;transition:all 0.2s;-webkit-appearance:none;}
.form-input::placeholder{color:#94a3b8;}
.form-input:focus{border-color:#1e40af;background:#EEF4FF;box-shadow:0 0 0 3px rgba(30,64,175,0.15);}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748b;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:color 0.15s;}
.toggle-pw:hover{color:#1e40af;}
.toggle-pw svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.error-msg{background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:10px 14px;font-size:12px;font-weight:600;color:#DC2626;margin-bottom:14px;display:none;align-items:center;gap:7px;}
.error-msg.show{display:flex;}
.btn-main{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:all 0.2s;box-shadow:0 4px 16px rgba(30,64,175,0.3);}
.btn-main:hover{opacity:0.92;}
.btn-main.loading{opacity:0.7;cursor:not-allowed;}
.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Change password screen */
.change-pw-header{text-align:center;margin-bottom:24px;}
.change-pw-icon{font-size:40px;margin-bottom:10px;}
.change-pw-title{font-size:18px;font-weight:800;color:var(--slate);}
.change-pw-sub{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5;}
.notice{background:#EEF4FF;border:1px solid #C7D7F5;border-radius:12px;padding:10px 14px;font-size:12px;color:#1e40af;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.pw-strength{height:4px;border-radius:2px;background:#e2e8f0;margin-top:6px;overflow:hidden;}
.pw-strength-fill{height:100%;border-radius:2px;transition:all 0.3s;width:0%;}
.pw-strength-label{font-size:10px;color:var(--muted);margin-top:4px;}

.success-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#eff6ff 0%,#ffffff 55%,#f0fdf4 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.5s ease;}
.success-overlay.show{opacity:1;pointer-events:all;}
.success-logo-wrap{position:relative;margin-bottom:24px;}
.success-logo-ring{position:absolute;inset:-14px;border-radius:36px;background:linear-gradient(135deg,rgba(30,64,175,0.15),rgba(99,102,241,0.1));animation:sRingPulse 2s ease-out infinite;}
@keyframes sRingPulse{0%{transform:scale(1);opacity:0.8;}60%{transform:scale(1.18);opacity:0;}100%{transform:scale(1);opacity:0;}}
.success-logo{width:100px;height:100px;object-fit:contain;border-radius:24px;display:block;position:relative;z-index:1;box-shadow:0 8px 32px rgba(30,64,175,0.18);animation:sLogoBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes sLogoBounce{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}
.success-check{position:absolute;bottom:-8px;right:-8px;width:32px;height:32px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;z-index:2;box-shadow:0 3px 10px rgba(34,197,94,0.45);animation:sLogoBounce 0.5s 0.35s cubic-bezier(0.34,1.56,0.64,1) both;}
.success-check svg{width:15px;height:15px;}
.success-check path{stroke-dasharray:22;stroke-dashoffset:22;animation:sDrawCheck 0.4s 0.75s ease forwards;}
@keyframes sDrawCheck{to{stroke-dashoffset:0;}}
.success-title{font-size:22px;font-weight:800;color:#0f172a;text-align:center;animation:sSlideUp 0.5s 0.2s ease both;}
@keyframes sSlideUp{from{transform:translateY(18px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.success-bar{width:200px;height:4px;background:#e2e8f0;border-radius:4px;margin-top:28px;overflow:hidden;animation:sSlideUp 0.5s 0.32s ease both;}
.success-bar-fill{height:100%;background:linear-gradient(90deg,#1e40af,#6366f1,#22c55e);border-radius:4px;width:0%;transition:width 1.5s cubic-bezier(0.4,0,0.2,1);}

@media(prefers-color-scheme:dark){
  body{background:#0f172a;}
  .card{background:#1e293b;border-radius:16px;padding:24px;}
  .change-pw-title,.k-label{color:#e2e8f0;}
  .change-pw-sub,.pw-strength-label{color:#94a3b8;}
  .form-input{background:#0f172a;border-color:#334155;color:#e2e8f0;}
  .notice{background:#1e293b;border-color:#334155;color:#93c5fd;}
}
</style>
</head>
<body>
<div class="card">

  <!-- Logo -->
  <div class="card-logo">
    <img src="logo..jpeg" alt="Logo" class="card-logo-img">
    <div class="card-logo-text">Smartordi<span>.chat</span></div>
  </div>

  <!-- SCREEN 1: Login -->
  <div class="screen active" id="screen-login">
    <div class="error-msg" id="errorMsg"><span>!</span><span id="errorText">Falscher Benutzername oder Passwort.</span></div>
    <div class="form-group">
      <label class="form-label">Benutzername</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input type="text" class="form-input" id="username" placeholder="benutzername" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="toggle-pw" onclick="togglePw('password','togglePw1')" id="togglePw1" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <button class="btn-main" id="loginBtn" onclick="doLogin()">
      <span id="btnText">Anmelden</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <!-- SCREEN 2: Passwort ändern (erste Anmeldung) -->
  <div class="screen" id="screen-changepw">
    <div class="change-pw-header">
      <div class="change-pw-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1e3a5f" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <div class="change-pw-title">Neues Passwort wählen</div>
      <div class="change-pw-sub">Bitte wählen Sie ein persönliches Passwort. Die Ordination wird keinen Zugriff darauf haben.</div>
    </div>
    <div class="notice">Ihr Passwort ist nur für Sie sichtbar</div>
    <div class="error-msg" id="errorMsg2"><span>!</span><span id="errorText2"></span></div>
    <div class="form-group">
      <label class="form-label">Neues Passwort</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" class="form-input" id="newPw" placeholder="Mindestens 6 Zeichen" oninput="checkStrength(this.value)" onkeydown="if(event.key==='Enter')document.getElementById('confirmPw').focus()">
        <button class="toggle-pw" onclick="togglePw('newPw','togglePw2')" id="togglePw2" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <div class="pw-strength"><div class="pw-strength-fill" id="strengthFill"></div></div>
      <div class="pw-strength-label" id="strengthLabel"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Passwort bestätigen</label>
      <div class="input-wrap">
        <span class="input-icon">✓</span>
        <input type="password" class="form-input" id="confirmPw" placeholder="Passwort wiederholen" onkeydown="if(event.key==='Enter')saveNewPw()">
        <button class="toggle-pw" onclick="togglePw('confirmPw','togglePw3')" id="togglePw3" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <button class="btn-main" onclick="saveNewPw()">✓ Passwort speichern & einloggen</button>
  </div>

</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-logo-wrap">
    <div class="success-logo-ring"></div>
    <img src="logo..jpeg" alt="Logo" class="success-logo">
    <div class="success-check">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
    </div>
  </div>
  <div class="success-title" id="successTitle">Willkommen!</div>
  <div class="success-bar"><div class="success-bar-fill" id="successBar"></div></div>
</div>

<script>
// Demo patients — firstLogin:true = muss Passwort ändern
const PATIENTS = {
  'thomas.mueller': { pw:'patient2026', name:'Thomas', firstLogin:true },
};

let currentUser = null;

const EYE_OPEN='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_OFF='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
function togglePw(inputId, btnId){
  const i=document.getElementById(inputId);
  const b=document.getElementById(btnId);
  i.type=i.type==='password'?'text':'password';
  b.innerHTML=i.type==='password'?EYE_OPEN:EYE_OFF;
}

function checkStrength(pw){
  const fill=document.getElementById('strengthFill');
  const label=document.getElementById('strengthLabel');
  if(!pw){fill.style.width='0%';label.textContent='';return;}
  let score=0;
  if(pw.length>=6)score++;
  if(pw.length>=8)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const configs=[
    {w:'20%',color:'#ef4444',text:'Sehr schwach'},
    {w:'40%',color:'#f59e0b',text:'Schwach'},
    {w:'60%',color:'#f59e0b',text:'Mittel'},
    {w:'80%',color:'#22c55e',text:'Stark'},
    {w:'100%',color:'#0d9488',text:'Sehr stark'},
  ];
  const c=configs[Math.min(score-1,4)]||configs[0];
  fill.style.width=c.w;fill.style.background=c.color;
  label.textContent=c.text;label.style.color=c.color;
}

function doLogin(){
  const u=document.getElementById('username').value.trim().toLowerCase();
  const p=document.getElementById('password').value;
  if(!u||!p)return;

  const btn=document.getElementById('loginBtn');
  document.getElementById('btnText').style.display='none';
  document.getElementById('spinner').style.display='block';
  btn.classList.add('loading');

  setTimeout(()=>{
    const acc=PATIENTS[u];
    if(!acc||acc.pw!==p){
      btn.classList.remove('loading');
      document.getElementById('btnText').style.display='block';
      document.getElementById('spinner').style.display='none';
      document.getElementById('errorMsg').classList.add('show');
      document.getElementById('password').value='';
      return;
    }
    currentUser = {username:u, ...acc};

    if(acc.firstLogin){
      // Show change password screen
      btn.classList.remove('loading');
      document.getElementById('btnText').style.display='block';
      document.getElementById('spinner').style.display='none';
      document.getElementById('screen-login').classList.remove('active');
      document.getElementById('screen-changepw').classList.add('active');
      document.getElementById('newPw').focus();
    } else {
      // Direct login
      sessionStorage.setItem('smartordi_user',JSON.stringify({role:'patient',name:acc.name}));
      document.getElementById('successTitle').textContent='Willkommen, '+acc.name+'!';
      document.getElementById('successOverlay').classList.add('show');
      setTimeout(()=>document.getElementById('successBar').style.width='100%',50);
      setTimeout(()=>window.location.href='patient.html',1800);
    }
  },900);
}

function saveNewPw(){
  const newPw=document.getElementById('newPw').value;
  const confirmPw=document.getElementById('confirmPw').value;
  const errorEl=document.getElementById('errorMsg2');
  const errorText=document.getElementById('errorText2');

  errorEl.classList.remove('show');

  if(newPw.length < 6){
    errorText.textContent='Passwort muss mindestens 6 Zeichen haben.';
    errorEl.classList.add('show');return;
  }
  if(newPw !== confirmPw){
    errorText.textContent='Passwörter stimmen nicht überein.';
    errorEl.classList.add('show');return;
  }
  if(newPw === PATIENTS[currentUser.username].pw){
    errorText.textContent='Bitte wählen Sie ein neues Passwort.';
    errorEl.classList.add('show');return;
  }

  // Save new password (in real app: API call)
  PATIENTS[currentUser.username].pw = newPw;
  PATIENTS[currentUser.username].firstLogin = false;

  sessionStorage.setItem('smartordi_user',JSON.stringify({role:'patient',name:currentUser.name}));
  document.getElementById('successTitle').textContent='Willkommen, '+currentUser.name+'!';
  document.getElementById('successOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('successBar').style.width='100%',50);
  setTimeout(()=>window.location.href='patient.html',1800);
}

window.addEventListener('load',()=>document.getElementById('username').focus());
</script>
</body>
</html>
