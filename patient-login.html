<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--teal:#0d9488;--teal-dark:#0f766e;--slate:#0f172a;--blue-light:#EEF4FF;--muted:#64748b;--red:#ef4444;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{width:100%;max-width:360px;}
.screen{display:none;}
.screen.active{display:block;}
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:6px;}
.input-wrap{position:relative;}
.input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.form-input{width:100%;padding:13px 14px 13px 42px;background:var(--blue-light);border:1.5px solid #C7D7F5;border-radius:12px;color:var(--slate);font-family:inherit;font-size:14px;outline:none;transition:all 0.2s;-webkit-appearance:none;}
.form-input::placeholder{color:#94a3b8;}
.form-input:focus{border-color:var(--teal);background:#E8F8F7;box-shadow:0 0 0 3px rgba(13,148,136,0.1);}
.toggle-pw{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;}
.error-msg{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:#DC2626;margin-bottom:14px;display:none;align-items:center;gap:7px;}
.error-msg.show{display:flex;}
.btn-main{width:100%;padding:14px;border:none;border-radius:12px;background:#1e3a5f;color:white;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:all 0.2s;box-shadow:0 4px 14px rgba(30,58,95,0.3);}
.btn-main:hover{opacity:0.92;}
.btn-main.loading{opacity:0.7;cursor:not-allowed;}
.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Change password screen */
.change-pw-header{text-align:center;margin-bottom:24px;}
.change-pw-icon{font-size:40px;margin-bottom:10px;}
.change-pw-title{font-size:18px;font-weight:800;color:var(--slate);}
.change-pw-sub{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5;}
.notice{background:#EEF4FF;border:1px solid #C7D7F5;border-radius:10px;padding:10px 14px;font-size:12px;color:#1e3a5f;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.pw-strength{height:4px;border-radius:2px;background:#e2e8f0;margin-top:6px;overflow:hidden;}
.pw-strength-fill{height:100%;border-radius:2px;transition:all 0.3s;width:0%;}
.pw-strength-label{font-size:10px;color:var(--muted);margin-top:4px;}

.success-overlay{position:fixed;inset:0;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.success-overlay.show{opacity:1;pointer-events:all;}
.success-icon{font-size:52px;margin-bottom:14px;}
.success-title{font-size:20px;font-weight:800;color:var(--slate);}
.success-bar{width:180px;height:3px;background:#e2e8f0;border-radius:2px;margin-top:18px;overflow:hidden;}
.success-bar-fill{height:100%;background:var(--teal);border-radius:2px;width:0%;transition:width 1.5s linear;}

@media(prefers-color-scheme:dark){
  body{background:#0f172a;}
  .card{background:#1e293b;border-radius:16px;padding:24px;}
  .change-pw-title,.k-label{color:#e2e8f0;}
  .change-pw-sub,.pw-strength-label{color:#94a3b8;}
  .form-input{background:#0f172a;border-color:#334155;color:#e2e8f0;}
  .notice{background:#1e293b;border-color:#334155;color:#93c5fd;}
}
</style>
</head>
<body>
<div class="card">

  <!-- SCREEN 1: Login -->
  <div class="screen active" id="screen-login">
    <div class="error-msg" id="errorMsg"><span>!</span><span id="errorText">Falscher Benutzername oder Passwort.</span></div>
    <div class="form-group">
      <label class="form-label">Benutzername</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input type="text" class="form-input" id="username" placeholder="benutzername" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="toggle-pw" onclick="togglePw('password','togglePw1')" id="togglePw1" tabindex="-1">&#9679;</button>
      </div>
    </div>
    <button class="btn-main" id="loginBtn" onclick="doLogin()">
      <span id="btnText">Anmelden</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <!-- SCREEN 2: Passwort ändern (erste Anmeldung) -->
  <div class="screen" id="screen-changepw">
    <div class="change-pw-header">
      <div class="change-pw-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1e3a5f" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <div class="change-pw-title">Neues Passwort wählen</div>
      <div class="change-pw-sub">Bitte wählen Sie ein persönliches Passwort. Die Ordination wird keinen Zugriff darauf haben.</div>
    </div>
    <div class="notice">Ihr Passwort ist nur für Sie sichtbar</div>
    <div class="error-msg" id="errorMsg2"><span>!</span><span id="errorText2"></span></div>
    <div class="form-group">
      <label class="form-label">Neues Passwort</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" class="form-input" id="newPw" placeholder="Mindestens 6 Zeichen" oninput="checkStrength(this.value)" onkeydown="if(event.key==='Enter')document.getElementById('confirmPw').focus()">
        <button class="toggle-pw" onclick="togglePw('newPw','togglePw2')" id="togglePw2" tabindex="-1">&#9679;</button>
      </div>
      <div class="pw-strength"><div class="pw-strength-fill" id="strengthFill"></div></div>
      <div class="pw-strength-label" id="strengthLabel"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Passwort bestätigen</label>
      <div class="input-wrap">
        <span class="input-icon">✓</span>
        <input type="password" class="form-input" id="confirmPw" placeholder="Passwort wiederholen" onkeydown="if(event.key==='Enter')saveNewPw()">
        <button class="toggle-pw" onclick="togglePw('confirmPw','togglePw3')" id="togglePw3" tabindex="-1">&#9679;</button>
      </div>
    </div>
    <button class="btn-main" onclick="saveNewPw()">✓ Passwort speichern & einloggen</button>
  </div>

</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-icon" style="font-size:40px;color:#1e3a5f;">✓</div>
  <div class="success-title" id="successTitle">Willkommen!</div>
  <div class="success-bar"><div class="success-bar-fill" id="successBar"></div></div>
</div>

<script>
// Demo patients — firstLogin:true = muss Passwort ändern
const PATIENTS = {
  'thomas.mueller': { pw:'patient2026', name:'Thomas', firstLogin:true },
};

let currentUser = null;

function togglePw(inputId, btnId){
  const i=document.getElementById(inputId);
  const b=document.getElementById(btnId);
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁':'👁';
}

function checkStrength(pw){
  const fill=document.getElementById('strengthFill');
  const label=document.getElementById('strengthLabel');
  if(!pw){fill.style.width='0%';label.textContent='';return;}
  let score=0;
  if(pw.length>=6)score++;
  if(pw.length>=8)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const configs=[
    {w:'20%',color:'#ef4444',text:'Sehr schwach'},
    {w:'40%',color:'#f59e0b',text:'Schwach'},
    {w:'60%',color:'#f59e0b',text:'Mittel'},
    {w:'80%',color:'#22c55e',text:'Stark'},
    {w:'100%',color:'#0d9488',text:'Sehr stark'},
  ];
  const c=configs[Math.min(score-1,4)]||configs[0];
  fill.style.width=c.w;fill.style.background=c.color;
  label.textContent=c.text;label.style.color=c.color;
}

function doLogin(){
  const u=document.getElementById('username').value.trim().toLowerCase();
  const p=document.getElementById('password').value;
  if(!u||!p)return;

  const btn=document.getElementById('loginBtn');
  document.getElementById('btnText').style.display='none';
  document.getElementById('spinner').style.display='block';
  btn.classList.add('loading');

  setTimeout(()=>{
    const acc=PATIENTS[u];
    if(!acc||acc.pw!==p){
      btn.classList.remove('loading');
      document.getElementById('btnText').style.display='block';
      document.getElementById('spinner').style.display='none';
      document.getElementById('errorMsg').classList.add('show');
      document.getElementById('password').value='';
      return;
    }
    currentUser = {username:u, ...acc};

    if(acc.firstLogin){
      // Show change password screen
      btn.classList.remove('loading');
      document.getElementById('btnText').style.display='block';
      document.getElementById('spinner').style.display='none';
      document.getElementById('screen-login').classList.remove('active');
      document.getElementById('screen-changepw').classList.add('active');
      document.getElementById('newPw').focus();
    } else {
      // Direct login
      sessionStorage.setItem('smartordi_user',JSON.stringify({role:'patient',name:acc.name}));
      document.getElementById('successTitle').textContent='Willkommen, '+acc.name+'!';
      document.getElementById('successOverlay').classList.add('show');
      setTimeout(()=>document.getElementById('successBar').style.width='100%',50);
      setTimeout(()=>window.location.href='patient.html',1800);
    }
  },900);
}

function saveNewPw(){
  const newPw=document.getElementById('newPw').value;
  const confirmPw=document.getElementById('confirmPw').value;
  const errorEl=document.getElementById('errorMsg2');
  const errorText=document.getElementById('errorText2');

  errorEl.classList.remove('show');

  if(newPw.length < 6){
    errorText.textContent='Passwort muss mindestens 6 Zeichen haben.';
    errorEl.classList.add('show');return;
  }
  if(newPw !== confirmPw){
    errorText.textContent='Passwörter stimmen nicht überein.';
    errorEl.classList.add('show');return;
  }
  if(newPw === PATIENTS[currentUser.username].pw){
    errorText.textContent='Bitte wählen Sie ein neues Passwort.';
    errorEl.classList.add('show');return;
  }

  // Save new password (in real app: API call)
  PATIENTS[currentUser.username].pw = newPw;
  PATIENTS[currentUser.username].firstLogin = false;

  sessionStorage.setItem('smartordi_user',JSON.stringify({role:'patient',name:currentUser.name}));
  document.getElementById('successTitle').textContent='Willkommen, '+currentUser.name+'!';
  document.getElementById('successOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('successBar').style.width='100%',50);
  setTimeout(()=>window.location.href='patient.html',1800);
}

window.addEventListener('load',()=>document.getElementById('username').focus());
</script>
</body>
</html>
